<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CareBridge Medical Patient Registration</title>
    <link rel="stylesheet" href="homework4.css">
</head>

<body>

<header id="header">
    <h1>CareBridge Medical</h1>
    <p>Today's Date: <span id="todayDate"></span></p>
</header>

<main id="main">
    <h2>Patient Registration Form</h2>

    <form id="patientForm" action="thankyou.html" method="get" novalidate>
        <table>

            <tr>
                <td><label for="firstName">First Name:</label></td>
                <td>
                    <input
                        type="text"
                        id="firstName"
                        name="firstName"
                        minlength="1"
                        maxlength="30"
                        pattern="[A-Za-z'-]{1,30}"
                        title="Enter 1–30 letters, apostrophes, or dashes."
                        oninput="validateFirstName()"
                        onblur="validateFirstName()"
                        required
                    >
                    <span class="error-message" id="firstNameError"></span>
                </td>

                <td><label for="middleInitial">MI:</label></td>
                <td>
                    <input
                        type="text"
                        id="middleInitial"
                        name="middleInitial"
                        maxlength="1"
                        pattern="[A-Za-z]?"
                        title="Enter one letter or leave blank."
                        oninput="validateMiddleInitial()"
                        onblur="validateMiddleInitial()"
                    >
                    <span class="error-message" id="middleInitialError"></span>
                </td>

                <td><label for="lastName">Last Name:</label></td>
                <td>
                    <input
                        type="text"
                        id="lastName"
                        name="lastName"
                        minlength="1"
                        maxlength="30"
                        pattern="[A-Za-z'-]{1,30}"
                        title="Enter 1–30 letters, apostrophes, or dashes."
                        oninput="validateLastName()"
                        onblur="validateLastName()"
                        required
                    >
                    <span class="error-message" id="lastNameError"></span>
                </td>
            </tr>

            <tr>
                <td><label for="dob">Date of Birth:</label></td>
                <td>
                    <input
                        type="text"
                        id="dob"
                        name="dob"
                        placeholder="MM/DD/YYYY"
                        maxlength="10"
                        title="Enter your birth date as MM/DD/YYYY. It cannot be in the future or more than 120 years ago."
                        oninput="formatDOB(); validateDOB()"
                        onblur="validateDOB()"
                        required
                    >
                    <span class="error-message" id="dobError"></span>
                </td>

                <td><label for="ssn">SSN/ID:</label></td>
                <td colspan="3">
                    <input
                        type="password"
                        id="ssn"
                        name="ssn"
                        maxlength="11"
                        inputmode="numeric"
                        title="Enter exactly 9 digits. Dashes will be added automatically."
                        oninput="formatSSN(); validateSSN()"
                        onblur="validateSSN()"
                        required
                    >
                    <span class="error-message" id="ssnError"></span>
                </td>
            </tr>

            <tr>
                <td><label for="address1">Address 1:</label></td>
                <td colspan="5">
                    <input
                        type="text"
                        id="address1"
                        name="address1"
                        size="50"
                        minlength="2"
                        maxlength="30"
                        title="Enter 2–30 characters for your street address."
                        oninput="validateAddress1()"
                        onblur="validateAddress1()"
                        required
                    >
                    <span class="error-message" id="address1Error"></span>
                </td>
            </tr>

            <tr>
                <td><label for="address2">Address 2:</label></td>
                <td colspan="5">
                    <input
                        type="text"
                        id="address2"
                        name="address2"
                        size="50"
                        minlength="2"
                        maxlength="30"
                        title="Optional. If entered, use 2–30 characters."
                        oninput="validateAddress2()"
                        onblur="validateAddress2()"
                    >
                    <span class="error-message" id="address2Error"></span>
                </td>
            </tr>

            <tr>
                <td><label for="city">City:</label></td>
                <td>
                    <input
                        type="text"
                        id="city"
                        name="city"
                        minlength="2"
                        maxlength="30"
                        pattern="[A-Za-z .'-]{2,30}"
                        title="Enter 2–30 valid city characters."
                        oninput="validateCity()"
                        onblur="validateCity()"
                        required
                    >
                    <span class="error-message" id="cityError"></span>
                </td>

                <td><label for="state">State:</label></td>
                <td>
                    <select
                        id="state"
                        name="state"
                        title="Select your state, Washington DC, or Puerto Rico."
                        onchange="validateState()"
                        onblur="validateState()"
                        required
                    >
                        >
                    </select>
                    <span class="error-message" id="stateError"></span>
                </td>

                <td><label for="zip">ZIP:</label></td>
                <td>
                    <input
                        type="text"
                        id="zip"
                        name="zip"
                        maxlength="5"
                        inputmode="numeric"
                        pattern="[0-9]{5}"
                        title="Enter exactly 5 digits."
                        oninput="validateZip()"
                        onblur="validateZip()"
                        required
                    >
                    <span class="error-message" id="zipError"></span>
                </td>
            </tr>

            <tr>
                <td><label for="email">Email:</label></td>
                <td colspan="5">
                    <input
                        type="email"
                        id="email"
                        name="email"
                        size="40"
                        title="Enter an email in the format name@domain.tld."
                        oninput="forceLowercaseEmail(); validateEmail()"
                        onblur="validateEmail()"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </td>
            </tr>

            <tr>
                <td><label for="symptoms">Symptoms:</label></td>
                <td colspan="5">
                    <textarea
                        id="symptoms"
                        name="symptoms"
                        rows="4"
                        cols="50"
                        maxlength="500"
                        title="Optionally describe your symptoms. Do not enter HTML tags."
                        oninput="validateSymptoms()"
                        onblur="validateSymptoms()"
                    ></textarea>
                    <span class="error-message" id="symptomsError"></span>
                </td>
            </tr>

            <tr>
                <td>Gender:</td>
                <td colspan="5">
                    <label><input type="radio" id="male" name="gender" value="Male" onchange="validateGender()"> Male</label>
                    <label><input type="radio" id="female" name="gender" value="Female" onchange="validateGender()"> Female</label>
                    <label><input type="radio" id="other" name="gender" value="Other" onchange="validateGender()"> Other</label>
                    <span class="error-message" id="genderError"></span>
                </td>
            </tr>

            <tr>
                <td>Vaccinated:</td>
                <td colspan="5">
                    <label><input type="radio" id="vaccinatedYes" name="vaccinated" value="Yes" onchange="validateVaccinated()"> Yes</label>
                    <label><input type="radio" id="vaccinatedNo" name="vaccinated" value="No" onchange="validateVaccinated()"> No</label>
                    <label><input type="radio" id="vaccinatedUnsure" name="vaccinated" value="Unsure" onchange="validateVaccinated()"> Unsure</label>
                    <span class="error-message" id="vaccinatedError"></span>
                </td>
            </tr>

            <tr>
                <td>Medical History:</td>
                <td colspan="5">
                    <label><input type="checkbox" id="chickenPox" name="medicalHistory" value="Chicken Pox"> Chicken Pox</label>
                    <label><input type="checkbox" id="measles" name="medicalHistory" value="Measles"> Measles</label>
                    <label><input type="checkbox" id="mumps" name="medicalHistory" value="Mumps"> Mumps</label>
                    <label><input type="checkbox" id="diabetes" name="medicalHistory" value="Diabetes"> Diabetes</label>
                    <label><input type="checkbox" id="heartDisease" name="medicalHistory" value="Heart Disease"> Heart Disease</label>
                    <label><input type="checkbox" id="covid" name="medicalHistory" value="Covid-19"> Covid-19</label>
                </td>
            </tr>

            <tr>
                <td><label for="healthRating">Health Rating:</label></td>
                <td colspan="5">
                    <input
                        type="range"
                        id="healthRating"
                        name="healthRating"
                        min="1"
                        max="10"
                        value="5"
                        title="Move the slider to rate your health from 1 to 10."
                        oninput="showRating()"
                    >
                    <span id="ratingValue">5</span>
                </td>
            </tr>

            <tr>
                <td><label for="userId">User ID:</label></td>
                <td colspan="5">
                    <input
                        type="text"
                        id="userId"
                        name="userId"
                        minlength="5"
                        maxlength="20"
                        pattern="[A-Za-z][A-Za-z0-9_-]{4,19}"
                        title="Use 5–20 characters. Start with a letter. Letters, numbers, dashes, and underscores only."
                        oninput="validateUserId()"
                        onblur="validateUserId()"
                        required
                    >
                    <span class="error-message" id="userIdError"></span>
                </td>
            </tr>

            <tr>
                <td><label for="password">Password:</label></td>
                <td colspan="5">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        minlength="8"
                        maxlength="30"
                        title="Use at least 8 characters with uppercase, lowercase, and a number."
                        oninput="validatePassword(); validateConfirmPassword()"
                        onblur="validatePassword()"
                        required
                    >
                    <span class="error-message" id="passwordError"></span>
                </td>
            </tr>

            <tr>
                <td><label for="confirmPassword">Confirm Password:</label></td>
                <td colspan="5">
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        minlength="8"
                        maxlength="30"
                        title="Re-enter the same password."
                        oninput="validateConfirmPassword()"
                        onblur="validateConfirmPassword()"
                        required
                    >
                    <span class="error-message" id="confirmPasswordError"></span>
                </td>
            </tr>

            <tr>
                <td colspan="6" class="button-cell">
                    <input type="button" value="Review" onclick="reviewForm()">
                    <input type="button" value="Validate" onclick="validateForm()">
                    <input type="reset" value="Start Over" onclick="resetFormMessages()">

                    <input
                        type="submit"
                        id="submitButton"
                        value="Submit Form"
                        hidden
                    >
                </td>
            </tr>

        </table>
    </form>

    <p id="formStatus" aria-live="polite"></p>

    <section id="reviewArea">
        <h2>Please Review This Information</h2>
        <div id="reviewOutput"></div>
    </section>
</main>

<footer id="footer">
    <p>CareBridge Medical Patient Registration</p>
</footer>

<script src="homework4.js"></script>

</body>
</html>
